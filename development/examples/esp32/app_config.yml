---
# ESP32 ADS7952 Driver - Apps Configuration
# This file centralizes all app definitions, their source files, and metadata
# Used by build scripts, flash scripts, CI workflows, and CMake
#
# HIERARCHICAL CONFIGURATION:
# - Global settings in 'metadata' section apply to all apps by default
# - Individual apps can override 'idf_versions' and 'build_types' if needed
# - Apps without overrides use global settings automatically

version: "1.0"

metadata:
  project: "ESP32 ADS7952 Driver Examples"
  default_app: "driver_integration_test"
  target: "esp32s3"
  idf_versions: ["release/v5.5", "release/v5.4"]
  build_types: [["Debug", "Release"], ["Debug"]]

apps:
  # --------------------------------------------------------------------------
  # Driver Integration Test Suite
  # --------------------------------------------------------------------------
  driver_integration_test:
    description: >
      Comprehensive driver integration test suite
      (hardware required for full validation)
    source_file: "driver_integration_test.cpp"
    category: "test"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    documentation: "docs/readme_driver_integration_test.md"
    test_sections:
      - "INITIALIZATION_TESTS"
      - "CHANNEL_READING_TESTS"
      - "MODE_SWITCHING_TESTS"
      - "AUTO_SEQUENCE_TESTS"
      - "RANGE_TESTS"
      - "ALARM_GPIO_TESTS"
      - "POWER_DOWN_TESTS"
      - "VOLTAGE_CONVERSION_TESTS"
      - "STABILITY_TESTS"
    features:
      - "Complete driver API validation"
      - "30+ individual test cases"
      - "Initialization, channel reading, mode switching"
      - "Auto-sequence programming and readback"
      - "Range configuration and voltage reference"
      - "Alarm threshold programming"
      - "GPIO configuration and output control"
      - "Power-down mode transitions"
      - "Voltage conversion accuracy"
      - "Repeated-read stability"
      - "Automatic pass/fail tracking"
      - "Hardware required for full SPI validation"

  # --------------------------------------------------------------------------
  # Basic ADC Reading Example
  # --------------------------------------------------------------------------
  basic_adc_reading:
    description: "Basic ADC channel reading example with voltage conversion"
    source_file: "basic_adc_reading_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: false
    featured: true
    hardware_required: true
    features:
      - "Driver initialization and first-frame discard"
      - "Manual mode single-channel reading"
      - "Auto-1 mode batch channel reading"
      - "Raw count and voltage output"
      - "Real hardware testing"

  # --------------------------------------------------------------------------
  # Multi-Mode Example
  # --------------------------------------------------------------------------
  multi_mode:
    description: "Demonstrates Manual, Auto-1, and Auto-2 operating modes"
    source_file: "multi_mode_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: false
    featured: true
    hardware_required: true
    features:
      - "Manual mode targeted channel reads"
      - "Auto-1 batch reads with full and subset masks"
      - "Auto-2 sequential reads with programmable last channel"
      - "Mode switching between all three modes"
      - "Range comparison (Vref vs 2xVref)"

  # --------------------------------------------------------------------------
  # Alarm & GPIO Example
  # --------------------------------------------------------------------------
  alarm_gpio:
    description: "Alarm threshold programming and GPIO pin control"
    source_file: "alarm_gpio_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: false
    featured: true
    hardware_required: true
    features:
      - "GPIO pin configuration (direction, function)"
      - "GPIO output toggling"
      - "Per-channel alarm threshold programming (low/high)"
      - "GPIO0 as alarm output"
      - "Alarm monitoring loop with threshold checking"

# ============================================================================
# BUILD CONFIGURATION (ESP-IDF Standard Build Types)
# ============================================================================

build_config:
  build_types:
    Debug:
      description: "Debug build with symbols, verbose logging, assertions"
      cmake_build_type: "Debug"
      optimization: "-O0"
      debug_level: "-g3"
      defines: ["DEBUG", "ADS7952_DEBUG"]

    Release:
      description: "Release build optimized for performance"
      cmake_build_type: "Release"
      optimization: "-O2"
      debug_level: "-g0"
      defines: ["NDEBUG", "ADS7952_RELEASE"]

  build_directory_pattern: "build-app-{app_type}-type-{build_type}-target-{target}-idf-{idf_version}"
  project_name_pattern: "esp32_ads7952_{app_type}_app"
